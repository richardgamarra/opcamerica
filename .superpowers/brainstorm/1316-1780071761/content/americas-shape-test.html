<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #0c1420; display: flex; align-items: center; justify-content: center; min-height: 100vh; gap: 60px; flex-wrap: wrap; }
  .label { color: rgba(255,255,255,0.4); font-family: sans-serif; font-size: 11px; text-align: center; margin-top: 8px; }
  .item { text-align: center; }
</style>
</head>
<body>

<!-- SIZE: Logo (tiny) -->
<div class="item">
  <svg width="24" height="36" viewBox="0 0 160 240" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- North America -->
    <path d="
      M 52,4
      C 62,1 80,0 95,2
      L 108,0 118,4 128,2 138,6
      C 144,9 148,14 146,20
      L 142,28 136,32 132,30
      C 130,36 132,42 128,48
      L 122,54 116,58 112,66
      L 108,74 104,82 100,90
      C 98,86 94,82 90,78
      L 84,74 78,72
      C 72,74 66,78 60,82
      L 54,88 48,92
      C 44,88 38,82 34,76
      L 28,66 24,56 26,44
      L 28,34 32,24 38,14
      Z
    " fill="rgba(232,82,42,0.15)" stroke="#e8522a" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Central America isthmus -->
    <path d="
      M 98,92 C 100,100 102,110 100,118
      C 99,122 98,126 98,130
      L 96,136 98,140 100,136 102,130
      C 102,124 102,118 100,110
      C 99,103 98,97 98,92 Z
    " fill="rgba(232,82,42,0.15)" stroke="#e8522a" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- South America -->
    <path d="
      M 84,140
      C 90,136 96,134 104,136
      L 114,140 122,148 128,158
      C 132,166 134,176 134,186
      L 132,196
      C 136,202 138,210 136,218
      L 132,228 126,234 118,238
      L 108,236 98,232 90,224
      L 82,212 78,200 76,188
      L 76,176 80,164 82,152
      Z
    " fill="rgba(232,82,42,0.15)" stroke="#e8522a" stroke-width="2.5" stroke-linejoin="round"/>
  </svg>
  <div class="label">Logo size (24px)</div>
</div>

<!-- SIZE: Medium (hero) -->
<div class="item">
  <svg width="160" height="240" viewBox="0 0 160 240" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- North America — traced properly -->
    <!-- Alaska bulge left, wide Canada top, Florida right, narrows to Mexico -->
    <path d="
      M 28,18
      C 20,16 14,22 16,30
      L 18,36 22,40
      C 26,38 30,34 34,32
      L 38,28 40,22
      C 36,18 32,18 28,18 Z
    " fill="rgba(232,82,42,0.12)" stroke="#e8522a" stroke-width="1.8"/>
    <!-- Main North America body -->
    <path d="
      M 42,8
      C 55,3 70,1 85,2
      L 100,0 112,3 122,1 132,5
      C 138,8 142,14 140,21
      L 136,29 130,33 126,31
      C 124,37 126,44 122,51
      L 116,57 110,61
      C 108,67 106,73 103,79
      L 100,87 97,94
      C 95,91 92,87 88,84
      L 82,80 76,78
      C 70,80 64,84 58,88
      L 52,93 46,96
      C 42,92 37,86 33,79
      L 28,69 24,58
      C 22,50 22,42 26,34
      L 30,24 36,15 42,8 Z
    " fill="rgba(232,82,42,0.12)" stroke="#e8522a" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- Florida peninsula -->
    <path d="M 108,72 L 112,80 L 116,88 L 114,94 L 110,90 L 107,80 Z" fill="rgba(232,82,42,0.12)" stroke="#e8522a" stroke-width="1.5"/>
    <!-- Central America isthmus - thin connector -->
    <path d="
      M 76,96 C 78,104 80,112 80,120
      L 80,128 82,134 84,128 84,120
      C 84,112 83,104 82,96 Z
    " fill="rgba(232,82,42,0.12)" stroke="#e8522a" stroke-width="1.8"/>
    <!-- South America — wider top, big Brazil eastern bulge, taper to southern tip -->
    <path d="
      M 62,138
      C 68,134 75,132 82,134
      L 92,136 102,140 110,146
      C 118,152 124,160 128,170
      L 132,180 134,192
      C 136,198 136,206 134,214
      L 130,220 128,228
      C 124,234 118,238 110,238
      L 102,236 94,232
      C 88,226 82,218 78,210
      L 74,198 70,186 68,174
      L 66,162 62,150 Z
    " fill="rgba(232,82,42,0.12)" stroke="#e8522a" stroke-width="1.8" stroke-linejoin="round"/>
    <!-- Southern tip / Chile -->
    <path d="M 78,228 L 74,234 L 72,240 L 75,238 L 78,233 Z" fill="rgba(232,82,42,0.12)" stroke="#e8522a" stroke-width="1.5"/>

    <!-- City dots -->
    <circle cx="105" cy="32" r="4" fill="#e8522a" opacity="0.9"/>  <!-- Toronto/NYC -->
    <circle cx="72" cy="60" r="4" fill="#e8522a" opacity="0.9"/>  <!-- Mexico City -->
    <circle cx="98" cy="120" r="3" fill="rgba(255,255,255,0.6)"/> <!-- Bogotá -->
    <circle cx="118" cy="178" r="4" fill="#e8522a" opacity="0.9"/> <!-- São Paulo -->
    <circle cx="82" cy="220" r="3" fill="rgba(255,255,255,0.6)"/> <!-- Santiago/BA -->

    <!-- Connection lines -->
    <line x1="105" y1="32" x2="72" y2="60" stroke="rgba(232,82,42,0.4)" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="72" y1="60" x2="98" y2="120" stroke="rgba(232,82,42,0.35)" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="98" y1="120" x2="118" y2="178" stroke="rgba(232,82,42,0.3)" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="118" y1="178" x2="82" y2="220" stroke="rgba(232,82,42,0.25)" stroke-width="1" stroke-dasharray="3,3"/>
  </svg>
  <div class="label">Hero size (160px)</div>
</div>

<!-- SIZE: Large standalone -->
<div class="item">
  <svg width="260" height="390" viewBox="0 0 160 240" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="
      M 28,18 C 20,16 14,22 16,30 L 18,36 22,40 C 26,38 30,34 34,32 L 38,28 40,22 C 36,18 32,18 28,18 Z

    <path d="M 108,72 L 112,80 L 116,88 L 114,94 L 110,90 L 107,80 Z" fill="rgba(232,82,42,0.1)" stroke="#e8522a" stroke-width="1"/>
    <path d="
      M 76,96 C 78,104 80,112 80,120 L 80,128 82,134 84,128 84,120 C 84,112 83,104 82,96 Z
    " fill="rgba(232,82,42,0.1)" stroke="#e8522a" stroke-width="1.2"/>
    <path d="
      M 62,138 C 68,134 75,132 82,134 L 92,136 102,140 110,146
      C 118,152 124,160 128,170 L 132,180 134,192
      C 136,198 136,206 134,214 L 130,220 128,228
      C 124,234 118,238 110,238 L 102,236 94,232
      C 88,226 82,218 78,210 L 74,198 70,186 68,174
      L 66,162 62,150 Z
    " fill="rgba(232,82,42,0.1)" stroke="#e8522a" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M 78,228 L 74,234 L 72,240 L 75,238 L 78,233 Z" fill="rgba(232,82,42,0.1)" stroke="#e8522a" stroke-width="1"/>

    <!-- Glow dots -->
    <circle cx="105" cy="32" r="5" fill="rgba(232,82,42,0.2)"/>
    <circle cx="105" cy="32" r="3" fill="#e8522a"/>
    <circle cx="72" cy="60" r="5" fill="rgba(232,82,42,0.2)"/>
    <circle cx="72" cy="60" r="3" fill="#e8522a"/>
    <circle cx="98" cy="120" r="4" fill="rgba(255,255,255,0.1)"/>
    <circle cx="98" cy="120" r="2.5" fill="rgba(255,255,255,0.7)"/>
    <circle cx="118" cy="178" r="5" fill="rgba(232,82,42,0.2)"/>
    <circle cx="118" cy="178" r="3" fill="#e8522a"/>
    <circle cx="82" cy="220" r="4" fill="rgba(255,255,255,0.1)"/>
    <circle cx="82" cy="220" r="2.5" fill="rgba(255,255,255,0.7)"/>
    <line x1="105" y1="32" x2="72" y2="60" stroke="rgba(232,82,42,0.45)" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="72" y1="60" x2="98" y2="120" stroke="rgba(232,82,42,0.35)" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="98" y1="120" x2="118" y2="178" stroke="rgba(232,82,42,0.3)" stroke-width="1" stroke-dasharray="4,3"/>
    <line x1="118" y1="178" x2="82" y2="220" stroke="rgba(232,82,42,0.25)" stroke-width="1" stroke-dasharray="4,3"/>
  </svg>
  <div class="label">Large hero size (260px)</div>
</div>

</body>
</html>
